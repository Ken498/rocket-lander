<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Rocket Lander</title>
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: #050a14;
      color: #fff;
      font-family: 'Courier New', Courier, monospace;
      overflow: hidden;
    }

    canvas { display: block; }

    /* ── HUD ─────────────────────────────────────────────────────────── */
    #hud {
      position: fixed; top: 16px; left: 16px;
      background: rgba(5, 10, 25, 0.75);
      border: 1px solid rgba(80, 120, 200, 0.35);
      border-radius: 6px;
      padding: 14px 18px;
      min-width: 210px;
      backdrop-filter: blur(4px);
      display: none;
    }
    #hud h2 {
      font-size: 10px; letter-spacing: 3px;
      color: #5588cc; margin-bottom: 10px;
    }
    .hud-row {
      display: flex; justify-content: space-between;
      gap: 16px; line-height: 1.9; font-size: 13px;
    }
    .lbl { color: #6688aa; }
    .val { color: #ddeeff; text-align: right; min-width: 90px; }
    .val.warn { color: #ffaa44; }

    /* ── Controls ────────────────────────────────────────────────────── */
    #controls {
      position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%);
      display: none; align-items: center; gap: 10px;
      background: rgba(5, 10, 25, 0.8);
      border: 1px solid rgba(80, 120, 200, 0.3);
      border-radius: 8px;
      padding: 10px 18px;
      backdrop-filter: blur(4px);
    }
    .ctrl-btn {
      background: rgba(255,255,255,0.08);
      border: 1px solid rgba(255,255,255,0.18);
      color: #ccd; border-radius: 4px;
      padding: 4px 10px; cursor: pointer;
      font-family: inherit; font-size: 13px;
      transition: background 0.15s;
    }
    .ctrl-btn:hover { background: rgba(255,255,255,0.16); }
    .ctrl-btn.active { background: rgba(60,100,220,0.35); border-color: #5588dd; color: #aaccff; }
    .ctrl-sep { color: #334; font-size: 18px; line-height: 1; }

    #timeline-wrap {
      width: 180px; height: 5px;
      background: rgba(255,255,255,0.1);
      border-radius: 3px; cursor: pointer; overflow: hidden;
    }
    #timeline-bar {
      height: 100%; width: 0%;
      background: linear-gradient(90deg, #3366cc, #66aaff);
      border-radius: 3px;
    }

    /* ── Corner labels ───────────────────────────────────────────────── */
    #corner {
      position: fixed; top: 16px; right: 16px;
      font-size: 10px; letter-spacing: 3px;
      color: rgba(100,140,200,0.45);
      text-align: right; line-height: 1.8;
    }

    /* ── Loading / error ─────────────────────────────────────────────── */
    #loading {
      position: fixed; top: 50%; left: 50%; transform: translate(-50%,-50%);
      font-size: 14px; letter-spacing: 4px; color: #5588cc;
    }
  </style>
</head>
<body>

  <div id="loading">COMPUTING TRAJECTORY…</div>

  <div id="corner">
    ROCKET LANDER<br>
    PHASE 1 · 2D · PID
  </div>

  <div id="hud">
    <h2>TELEMETRY</h2>
    <div class="hud-row"><span class="lbl">time</span>    <span class="val" id="h-t">—</span></div>
    <div class="hud-row"><span class="lbl">altitude</span><span class="val" id="h-alt">—</span></div>
    <div class="hud-row"><span class="lbl">v_vert</span>  <span class="val" id="h-vy">—</span></div>
    <div class="hud-row"><span class="lbl">speed</span>   <span class="val" id="h-spd">—</span></div>
    <div class="hud-row"><span class="lbl">θ</span>       <span class="val" id="h-th">—</span></div>
    <div class="hud-row"><span class="lbl">mass</span>    <span class="val" id="h-m">—</span></div>
    <div class="hud-row"><span class="lbl">thrust</span>  <span class="val" id="h-thr">—</span></div>
  </div>

  <div id="controls">
    <button class="ctrl-btn" id="btn-restart">⏮</button>
    <button class="ctrl-btn" id="btn-play">⏸</button>
    <span class="ctrl-sep">|</span>
    <button class="ctrl-btn" id="btn-h">½×</button>
    <button class="ctrl-btn active" id="btn-1">1×</button>
    <button class="ctrl-btn" id="btn-2">2×</button>
    <button class="ctrl-btn" id="btn-4">4×</button>
    <span class="ctrl-sep">|</span>
    <div id="timeline-wrap"><div id="timeline-bar"></div></div>
  </div>

  <script type="importmap">
  {
    "imports": {
      "three": "https://cdn.jsdelivr.net/npm/three@0.158.0/build/three.module.js",
      "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.158.0/examples/jsm/"
    }
  }
  </script>
  <script type="module" src="main.js"></script>
</body>
</html>
