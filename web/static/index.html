<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ROCKET LANDER — MISSION CONTROL</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;500;600;700;900&family=Space+Mono:ital,wght@0,400;0,700;1,400&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg:        #020617;
      --panel-bg:  rgba(2, 8, 22, 0.88);
      --border:    rgba(0, 210, 255, 0.2);
      --cyan:      #00D2FF;
      --cyan-dim:  rgba(0, 210, 255, 0.12);
      --blue:      #0070CC;
      --orange:    #FF6B35;
      --green:     #00FF88;
      --red:       #FF3355;
      --text:      #cce8ff;
      --dim:       #2a5570;
      --font-hud:  'Orbitron', sans-serif;
      --font-data: 'Space Mono', monospace;
      --glow-c:    0 0 6px rgba(0,210,255,0.55), 0 0 20px rgba(0,210,255,0.15);
      --glow-o:    0 0 6px rgba(255,107,53,0.6), 0 0 14px rgba(255,107,53,0.2);
      --glow-g:    0 0 6px rgba(0,255,136,0.5);
    }

    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: var(--font-data);
      overflow: hidden;
      user-select: none;
      -webkit-font-smoothing: antialiased;
    }

    canvas { display: block; }

    /* ── Scanlines overlay ─────────────────────────────────────────── */
    body::before {
      content: '';
      position: fixed; inset: 0;
      background: repeating-linear-gradient(
        0deg, transparent, transparent 2px,
        rgba(0, 0, 0, 0.06) 2px, rgba(0, 0, 0, 0.06) 4px
      );
      pointer-events: none;
      z-index: 900;
    }

    /* ── Panel base ────────────────────────────────────────────────── */
    .panel {
      position: fixed;
      background: var(--panel-bg);
      border: 1px solid var(--border);
      backdrop-filter: blur(14px);
      -webkit-backdrop-filter: blur(14px);
    }

    /* Corner L-brackets */
    .panel::before, .panel::after {
      content: '';
      position: absolute;
      width: 10px; height: 10px;
      border-color: var(--cyan);
      border-style: solid;
      opacity: 0.6;
      transition: opacity 0.3s;
    }
    .panel::before { top: -1px; left: -1px; border-width: 2px 0 0 2px; }
    .panel::after  { bottom: -1px; right: -1px; border-width: 0 2px 2px 0; }
    .panel:hover::before, .panel:hover::after { opacity: 1; }

    /* ── Panel title ───────────────────────────────────────────────── */
    .panel-title {
      font-family: var(--font-hud);
      font-size: 9px;
      font-weight: 600;
      letter-spacing: 4px;
      color: var(--cyan);
      text-shadow: var(--glow-c);
      margin-bottom: 14px;
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .panel-title::before {
      content: '';
      flex-shrink: 0;
      width: 6px; height: 6px;
      background: var(--cyan);
      border-radius: 50%;
      box-shadow: var(--glow-c);
      animation: blink 1.6s ease-in-out infinite;
    }

    @keyframes blink {
      0%, 100% { opacity: 1; }
      50%       { opacity: 0.15; }
    }

    /* ── HUD telemetry (left) ──────────────────────────────────────── */
    #hud {
      top: 16px; left: 16px;
      width: 230px;
      padding: 18px 16px 16px;
      display: none;
    }

    .hud-row {
      display: flex;
      justify-content: space-between;
      align-items: baseline;
      padding: 5px 0;
      border-bottom: 1px solid rgba(0, 210, 255, 0.07);
    }
    .hud-row:last-of-type { border-bottom: none; }

    .lbl {
      font-family: var(--font-hud);
      font-size: 8px;
      font-weight: 500;
      letter-spacing: 2px;
      color: var(--dim);
      text-transform: uppercase;
    }
    .val {
      font-family: var(--font-data);
      font-size: 12px;
      color: var(--text);
      text-align: right;
      min-width: 96px;
      transition: color 0.2s, text-shadow 0.2s;
    }
    .val.hot  { color: var(--orange); text-shadow: var(--glow-o); }
    .val.good { color: var(--green);  text-shadow: var(--glow-g); }

    /* Thrust gauge */
    #thrust-gauge-wrap {
      margin-top: 14px;
      padding-top: 12px;
      border-top: 1px solid var(--border);
    }
    .gauge-label {
      font-family: var(--font-hud);
      font-size: 8px;
      letter-spacing: 2px;
      color: var(--dim);
      margin-bottom: 7px;
    }
    .gauge-track {
      height: 5px;
      background: rgba(0, 210, 255, 0.08);
      border-radius: 3px;
      overflow: hidden;
    }
    #thrust-fill {
      height: 100%;
      width: 0%;
      border-radius: 3px;
      background: linear-gradient(90deg, var(--blue), var(--cyan));
      box-shadow: 0 0 8px rgba(0, 210, 255, 0.5);
      transition: width 0.08s linear, background 0.3s;
    }
    #thrust-fill.hot {
      background: linear-gradient(90deg, #aa2200, var(--orange));
      box-shadow: 0 0 10px rgba(255, 107, 53, 0.6);
    }
    .gauge-scale {
      display: flex;
      justify-content: space-between;
      margin-top: 5px;
    }
    .gauge-scale span {
      font-family: var(--font-hud);
      font-size: 7px;
      color: var(--dim);
    }
    #h-thr {
      font-family: var(--font-data);
      font-size: 11px;
      min-width: auto;
    }

    /* ── Mission status (top right) ────────────────────────────────── */
    #status-panel {
      top: 16px; right: 16px;
      padding: 14px 18px;
      text-align: right;
      display: none;
    }
    .mission-id {
      font-family: var(--font-hud);
      font-size: 13px;
      font-weight: 900;
      letter-spacing: 4px;
      color: var(--cyan);
      text-shadow: var(--glow-c);
    }
    .mission-sub {
      font-family: var(--font-hud);
      font-size: 8px;
      letter-spacing: 2px;
      color: var(--dim);
      margin-top: 5px;
    }
    #mission-status {
      font-family: var(--font-hud);
      font-size: 9px;
      font-weight: 600;
      letter-spacing: 3px;
      margin-top: 10px;
      color: var(--green);
      text-shadow: var(--glow-g);
      transition: color 0.4s, text-shadow 0.4s;
    }
    #mission-status.warn  { color: var(--orange); text-shadow: var(--glow-o); }
    #mission-status.alert { color: var(--red);    text-shadow: 0 0 8px rgba(255,51,85,0.6); }

    /* ── Mission control bar (bottom) ──────────────────────────────── */
    #controls {
      bottom: 20px;
      left: 50%;
      transform: translateX(-50%);
      padding: 12px 20px;
      display: none;
      align-items: center;
      gap: 10px;
      white-space: nowrap;
    }

    .ctrl-btn {
      background: transparent;
      border: 1px solid var(--border);
      color: var(--dim);
      border-radius: 2px;
      padding: 6px 14px;
      cursor: pointer;
      font-family: var(--font-hud);
      font-size: 9px;
      letter-spacing: 2px;
      transition: all 0.15s ease;
      position: relative;
    }
    .ctrl-btn::before, .ctrl-btn::after {
      content: '';
      position: absolute;
      width: 4px; height: 4px;
      border-color: var(--cyan);
      border-style: solid;
      opacity: 0;
      transition: opacity 0.15s;
    }
    .ctrl-btn::before { top: -1px; left: -1px; border-width: 1px 0 0 1px; }
    .ctrl-btn::after  { bottom: -1px; right: -1px; border-width: 0 1px 1px 0; }
    .ctrl-btn:hover {
      border-color: rgba(0, 210, 255, 0.5);
      color: var(--cyan);
      background: var(--cyan-dim);
    }
    .ctrl-btn:hover::before, .ctrl-btn:hover::after { opacity: 1; }
    .ctrl-btn.active {
      background: rgba(0, 210, 255, 0.12);
      border-color: var(--cyan);
      color: var(--cyan);
      box-shadow: 0 0 12px rgba(0, 210, 255, 0.15);
    }
    .ctrl-btn.active::before, .ctrl-btn.active::after { opacity: 1; }

    .ctrl-sep {
      width: 1px; height: 22px;
      background: var(--border);
      flex-shrink: 0;
    }

    /* Timeline */
    #timeline-wrap {
      width: 200px; height: 4px;
      background: rgba(0, 210, 255, 0.07);
      border: 1px solid rgba(0, 210, 255, 0.12);
      border-radius: 2px;
      cursor: pointer;
      position: relative;
      overflow: hidden;
    }
    #timeline-bar {
      height: 100%;
      width: 0%;
      background: linear-gradient(90deg, var(--blue), var(--cyan));
      box-shadow: 0 0 8px rgba(0, 210, 255, 0.6);
      border-radius: 2px;
    }
    /* Scanning shimmer on timeline */
    #timeline-wrap::after {
      content: '';
      position: absolute;
      top: 0; width: 40px; height: 100%;
      background: linear-gradient(90deg, transparent, rgba(0,210,255,0.5), transparent);
      animation: scan 3s linear infinite;
      pointer-events: none;
    }
    @keyframes scan { from { left: -40px; } to { left: calc(100% + 40px); } }

    /* ── Boot/loading screen ───────────────────────────────────────── */
    #loading {
      position: fixed; inset: 0;
      background: var(--bg);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 20px;
      z-index: 1000;
    }
    .boot-title {
      font-family: var(--font-hud);
      font-size: 26px;
      font-weight: 900;
      letter-spacing: 10px;
      color: var(--cyan);
      text-shadow: var(--glow-c);
    }
    .boot-sub {
      font-family: var(--font-hud);
      font-size: 9px;
      letter-spacing: 5px;
      color: var(--dim);
    }
    .boot-bar-wrap {
      width: 300px; height: 2px;
      background: rgba(0, 210, 255, 0.08);
      border-radius: 1px;
      overflow: hidden;
    }
    .boot-bar {
      height: 100%;
      background: linear-gradient(90deg, var(--blue), var(--cyan));
      box-shadow: 0 0 8px var(--cyan);
      animation: boot-fill 1.8s cubic-bezier(0.4, 0, 0.2, 1) forwards;
    }
    @keyframes boot-fill { from { width: 0; } to { width: 100%; } }
    .boot-msg {
      font-family: var(--font-data);
      font-size: 11px;
      letter-spacing: 1px;
      color: var(--dim);
    }

    /* ── Reduced motion ────────────────────────────────────────────── */
    @media (prefers-reduced-motion: reduce) {
      *, *::before, *::after {
        animation-duration: 0.001ms !important;
        transition-duration: 0.001ms !important;
      }
    }
  </style>
</head>
<body>

  <!-- Boot screen -->
  <div id="loading">
    <div class="boot-title">ROCKET LANDER</div>
    <div class="boot-sub">MISSION CONTROL INTERFACE</div>
    <div class="boot-bar-wrap"><div class="boot-bar"></div></div>
    <div class="boot-msg">LOADING TRAJECTORY DATA…</div>
  </div>

  <!-- Telemetry HUD — left -->
  <div id="hud" class="panel">
    <div class="panel-title">TELEMETRY</div>
    <div class="hud-row"><span class="lbl">T+</span>       <span class="val" id="h-t">—</span></div>
    <div class="hud-row"><span class="lbl">ALT</span>      <span class="val" id="h-alt">—</span></div>
    <div class="hud-row"><span class="lbl">V_VERT</span>   <span class="val" id="h-vy">—</span></div>
    <div class="hud-row"><span class="lbl">SPEED</span>    <span class="val" id="h-spd">—</span></div>
    <div class="hud-row"><span class="lbl">THETA</span>    <span class="val" id="h-th">—</span></div>
    <div class="hud-row"><span class="lbl">MASS</span>     <span class="val" id="h-m">—</span></div>
    <div id="thrust-gauge-wrap">
      <div class="gauge-label">THRUST OUTPUT</div>
      <div class="gauge-track"><div id="thrust-fill"></div></div>
      <div class="gauge-scale">
        <span>0</span>
        <span id="h-thr" class="val">—</span>
        <span>30 kN</span>
      </div>
    </div>
  </div>

  <!-- Mission ID — top right -->
  <div id="status-panel" class="panel">
    <div class="mission-id">RL-001</div>
    <div class="mission-sub">PHASE 1 · 2D · PID AUTOPILOT</div>
    <div id="mission-status">● NOMINAL</div>
  </div>

  <!-- Mission control — bottom centre -->
  <div id="controls" class="panel">
    <button class="ctrl-btn" id="btn-restart">RST</button>
    <button class="ctrl-btn" id="btn-play">PAUSE</button>
    <div class="ctrl-sep"></div>
    <button class="ctrl-btn" id="btn-h">0.5×</button>
    <button class="ctrl-btn active" id="btn-1">1×</button>
    <button class="ctrl-btn" id="btn-2">2×</button>
    <button class="ctrl-btn" id="btn-4">4×</button>
    <div class="ctrl-sep"></div>
    <div id="timeline-wrap" title="Click to seek"><div id="timeline-bar"></div></div>
  </div>

  <script type="importmap">
  {
    "imports": {
      "three": "https://cdn.jsdelivr.net/npm/three@0.158.0/build/three.module.js",
      "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.158.0/examples/jsm/"
    }
  }
  </script>
  <script type="module" src="main.js"></script>
</body>
</html>
